[phases.setup]
nixPkgs = ["python311Full", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m ensurepip --upgrade",
  "python3 -m pip install --upgrade pip",
  "python3 -m pip install -r backend/requirements.txt",
  "npm --prefix frontend ci"
]

[phases.build]
cmds = [
  "NEXT_PUBLIC_API_URL=/api/v1 INTERNAL_API_URL=http://127.0.0.1:8000 npm --prefix frontend run build"
]

[start]
cmd = "./railway-start.sh"
